services:
  postgres:
    image: postgres:16
    container_name: study-tracker-postgres
    environment:
      POSTGRES_DB: study_tracker
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
    ports:
      - "5432:5432"
    volumes:
      - study_tracker_db_data:/var/lib/postgresql/data

volumes:
  study_tracker_db_data:
