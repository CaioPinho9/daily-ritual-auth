spring.application.name=daily-ritual-auth

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/daily_ritual}
spring.datasource.username=${DB_USER:daily_ritual}
spring.datasource.password=${DB_PASSWORD:daily_ritual}

spring.jpa.properties.hibernate.default_schema=auth
spring.liquibase.default-schema=auth
spring.liquibase.liquibase-schema=auth

spring.jpa.hibernate.ddl-auto=validate

auth.jwt.secret=${AUTH_JWT_SECRET:dev-jwt-secret-change-me-dev-jwt-secret}
auth.jwt.access-token-ttl-seconds=${AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:900}
auth.refresh-token.ttl-days=${AUTH_REFRESH_TOKEN_TTL_DAYS:30}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
