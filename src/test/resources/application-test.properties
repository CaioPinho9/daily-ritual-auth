spring.datasource.url=jdbc:h2:mem:study_tracker_auth_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS auth\\;SET SCHEMA auth
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.liquibase.enabled=false

auth.jwt.secret=test-jwt-secret-change-me-test-jwt-secret
auth.jwt.access-token-ttl-seconds=900
auth.refresh-token.ttl-days=30
